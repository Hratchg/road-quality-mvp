services:
  db:
    build: ./db
    environment:
      POSTGRES_DB: roadquality
      POSTGRES_USER: rq
      POSTGRES_PASSWORD: rqpass
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init-pgrouting.sh:/docker-entrypoint-initdb.d/01-pgrouting.sh
      - ./db/migrations/001_initial.sql:/docker-entrypoint-initdb.d/02-schema.sql
      - ./db/migrations/002_mapillary_provenance.sql:/docker-entrypoint-initdb.d/03-mapillary.sql
      - ./db/migrations/003_users.sql:/docker-entrypoint-initdb.d/04-users.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rq -d roadquality"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://rq:rqpass@db:5432/roadquality
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_MAPBOX_TOKEN: ""
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  pgdata:
