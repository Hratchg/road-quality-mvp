# LA pothole eval dataset — committed seed.
#
# Populated by scripts/fetch_eval_data.py --build (Phase 2 Plan 03).
# Single-class per Phase 2 D-05 + RESEARCH.md Pattern 4 — severity
# (moderate vs severe) is derived from confidence at inference time per
# data_pipeline/yolo_detector.py::_map_severity:
#     confidence >= 0.7  -> "severe"
#     confidence >= 0.4  -> "moderate"
#     below 0.4          -> dropped
#
# If fetch_eval_data.py --build regenerates this file, keep nc + names
# identical — downstream eval depends on class_id 0 == "pothole".

path: data/eval_la
train: images/train
val: images/val
test: images/test

nc: 1
names:
  0: pothole
